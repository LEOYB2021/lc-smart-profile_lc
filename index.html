<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f3b82">

  <meta name="apple-mobile-web-app-title" content="LC Smart">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <meta name="mobile-web-app-capable" content="yes">

  <title>LC_Smart Profile</title>

  <link rel="manifest" href="manifest.json">

  <link rel="icon" href="app_icon_qr.png">
  <link rel="shortcut icon" href="app_icon_qr.png">

  <link rel="apple-touch-icon" href="app_icon_qr.png">
  <link rel="apple-touch-icon" sizes="120x120" href="app_icon_qr.png">
  <link rel="apple-touch-icon" sizes="152x152" href="app_icon_qr.png">
  <link rel="apple-touch-icon" sizes="167x167" href="app_icon_qr.png">
  <link rel="apple-touch-icon" sizes="180x180" href="app_icon_qr.png">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="app_icon_qr.png">

  <style>
    :root {
      --primary: #0f3b82;
      --primary2: #2563eb;
      --bg: #f4f7fb;
      --text: #0f172a;
      --muted: #64748b;
      --line: #dbe3ef;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .app-shell {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    .splash {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: linear-gradient(145deg, #0f3b82, #2563eb);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      text-align: center;
      transition: opacity .25s ease;
    }

    .splash.hide {
      opacity: 0;
      pointer-events: none;
    }

    .splash-card {
      width: 100%;
      max-width: 420px;
    }

    .logo {
      width: 112px;
      height: 112px;
      border-radius: 28px;
      object-fit: cover;
      background: white;
      padding: 6px;
      box-shadow: 0 20px 55px rgba(0,0,0,.25);
      margin-bottom: 18px;
    }

    .title {
      font-size: 34px;
      font-weight: 900;
      line-height: 1.15;
      margin: 0;
    }

    .sub {
      margin: 12px 0 22px;
      font-size: 22px;
      line-height: 1.4;
      opacity: .92;
    }

    .loading-text {
      font-size: 20px;
      font-weight: 800;
      opacity: .95;
    }

    .open-btn {
      display: none;
      border: 0;
      border-radius: 24px;
      min-height: 68px;
      width: 100%;
      background: #fff;
      color: var(--primary);
      font-size: 23px;
      font-weight: 900;
      padding: 16px 18px;
      margin-top: 18px;
    }

    .frame-wrap {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: var(--bg);
    }

    .fallback {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 30;
      background: var(--bg);
      padding: calc(24px + env(safe-area-inset-top)) 20px calc(24px + env(safe-area-inset-bottom));
      overflow: auto;
    }

    .fallback-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 30px;
      padding: 24px;
      box-shadow: 0 14px 40px rgba(15,23,42,.08);
      text-align: center;
      margin-top: 36px;
    }

    .fallback h1 {
      font-size: 32px;
      line-height: 1.2;
      margin: 0 0 12px;
      color: var(--text);
    }

    .fallback p {
      font-size: 22px;
      line-height: 1.45;
      color: var(--muted);
    }

    .fallback a {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 70px;
      border-radius: 24px;
      background: var(--primary2);
      color: #fff;
      text-decoration: none;
      font-size: 23px;
      font-weight: 900;
      margin-top: 18px;
      padding: 16px;
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <div id="splash" class="splash">
      <div class="splash-card">
        <img class="logo" src="app_icon_qr.png" alt="LC Smart">
        <h1 class="title">LC_Smart Profile</h1>
        <div class="sub">Đang mở ứng dụng...</div>
        <div class="loading-text">Vui lòng chờ trong giây lát</div>
        <button class="open-btn" onclick="openDirect()">Mở ứng dụng</button>
      </div>
    </div>

    <div class="frame-wrap">
      <iframe
        id="appFrame"
        src="https://script.google.com/macros/s/AKfycbyE5a1ES9PcKABIaEvpFtsfR0HIbMjLAQP7iHbUjjXHj-Qwlgga7rfwUMYbMBXnUWT5/exec"
        allow="fullscreen"
        onload="hideSplash()"
      ></iframe>
    </div>
  </div>

  <div id="fallback" class="fallback">
    <div class="fallback-card">
      <img class="logo" src="app_icon_qr.png" alt="LC Smart Profile">
      <h1>LC_Smart Profile</h1>
      <p>Nếu ứng dụng không hiển thị bên trong trang này, bấm nút bên dưới để mở trực tiếp.</p>
      <a href="https://script.google.com/macros/s/AKfycbyE5a1ES9PcKABIaEvpFtsfR0HIbMjLAQP7iHbUjjXHj-Qwlgga7rfwUMYbMBXnUWT5/exec">
        Mở trực tiếp ứng dụng
      </a>
    </div>
  </div>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbyE5a1ES9PcKABIaEvpFtsfR0HIbMjLAQP7iHbUjjXHj-Qwlgga7rfwUMYbMBXnUWT5/exec";
  
    let appLoaded = false;
  
    function hideSplash() {
      appLoaded = true;
  
      setTimeout(() => {
        document.getElementById("splash").classList.add("hide");
      }, 700);
    }
  
    function openDirect() {
      window.location.href = APP_URL;
    }
  
    setTimeout(() => {
      if (!appLoaded) {
        const openBtn = document.querySelector(".open-btn");
        const fallback = document.getElementById("fallback");
  
        if (openBtn) {
          openBtn.style.display = "block";
        }
  
        if (fallback) {
          fallback.style.display = "block";
        }
      }
    }, 5000);
  </script>
</body>
</html>
